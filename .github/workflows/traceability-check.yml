name: Traceability Check

on:
  pull_request:
    branches: [main]

jobs:
  check-traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip docs-only PRs
        id: skip_check
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" == docs/* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ Docs branch — skipping traceability check"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check PR has required traceability fields
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          MISSING=()
          echo "$PR_BODY" | grep -q "Requirement.*REQ-" || MISSING+=("Requirement ID")
          echo "$PR_BODY" | grep -q "Design.*DES-"      || MISSING+=("Design ID")
          echo "$PR_BODY" | grep -q "Component.*CMP-"   || MISSING+=("Component ID")
          echo "$PR_BODY" | grep -q "Tests.*TEST-"       || MISSING+=("Test ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing: ${MISSING[*]}"
            exit 1
          fi
          echo "✓ All traceability fields present"

      - name: Check REQ file exists
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          REQ=$(echo "${{ github.event.pull_request.body }}" \
            | grep "Requirement" | grep -oP "REQ-[A-Z]+-[0-9]+")
          if [ -z "$REQ" ]; then
            echo "❌ Could not parse REQ ID"
            exit 1
          fi
          FILE=".codex/specs/requirements/${REQ}.md"
          [ -f "$FILE" ] && echo "✓ $FILE exists" || { echo "❌ $FILE not found"; exit 1; }